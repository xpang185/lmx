runs: 1
tests:
  - name: "basic-summary"
    input: "The cat sat on the mat. The cat was happy. The mat was red. The cat liked the red mat."
    params:
      max-chars: 70
    assert:
      - contains: "cat"
      - max_chars: 70
  - name: "bullets-format"
    input: "Point one is about X. Point two is about Y. Point three is about Z."
    params:
      format: "bullets"
    assert:
      - contains: "-"
      - min_lines: 2
